<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Roam2World</title>
  <desc id="desc">Roam2World global eSIM management banner.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#edf4ff"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42b5e8"/>
      <stop offset="55%" stop-color="#2d78d0"/>
      <stop offset="100%" stop-color="#1a2450"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f244f" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <circle cx="1040" cy="130" r="170" fill="#dbeaff"/>
  <circle cx="1120" cy="470" r="220" fill="#e5efff"/>
  <g opacity="0.55" stroke="#9bc1f0" stroke-width="4" fill="none">
    <path d="M860 160c60 18 110 58 140 110"/>
    <path d="M900 240c48 10 90 34 118 70"/>
    <path d="M850 320c72 6 132 30 170 82"/>
  </g>

  <g transform="translate(92 110)" filter="url(#shadow)">
    <rect width="360" height="360" rx="76" fill="#ffffff"/>
    <circle cx="274" cy="86" r="36" fill="#e4f1ff"/>
    <text x="92" y="285" font-family="Arial, Helvetica, sans-serif" font-size="260" font-weight="900" fill="url(#logo)">R</text>
    <text x="196" y="142" font-family="Arial, Helvetica, sans-serif" font-size="112" font-weight="700" fill="#ffffff" transform="rotate(-28 196 142)">✈</text>
  </g>

  <g transform="translate(540 172)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="800" fill="#13264d">Roam2World</text>
    <text x="0" y="64" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="3" fill="#4b6a98">GLOBAL eSIM MANAGEMENT</text>
    <rect x="0" y="100" width="430" height="4" rx="2" fill="#9dc0ef"/>
    <text x="0" y="164" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="500" fill="#1f2f4f">Instant activation. Secure control. Worldwide connectivity.</text>
    <text x="0" y="216" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="#516985">Manage every eSIM from one app.</text>
  </g>
</svg>
